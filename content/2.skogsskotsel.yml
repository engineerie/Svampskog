title: Skogsskötsel
chartSection:
  headline: Diagram
  title: Mykorrhizans minskning och återhämtning
  description: Diagrammen visar hur mängden mykorrhiza minskar efter olika ingrepp och hur svampgrupper återhämtar sig. Diagram presenteras för den totala mängden, för olika svampgrupper, matsvampar och naturvårdsarter.
  features:
    - title: Underlag
      description: DNA-analyser av svamparters förekomst i mark vid olika skogsåldrar från Markinventeringen som summerats för olika grupper mykorrhizasvampar.
    - description: Den relativa andelen för respektive grupp svampgrupp har multiplicerats med den relativa trädtillväxten vid olika ålder och skogsskötsel. Trädtillväxten är ett ungefärligt mått på trädens fotosyntes och ger en ungefärlig bild av hur mycket mykorrhizasvamp som kan finnas.
    - description: Diagrammen över matsvampar som redovisas i kg/ha bygger på sammanställda undersökningar i Sverige och Finland.
  chart:
    selectedChart: skogsskole
    parentSelectedFrameworks:
      - trakthygge
      - blädning
    currentStartskog: naturskog
    showControls: true
