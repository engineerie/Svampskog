factsSection:
  title: Mykorrhiza i skogen – korta fakta
  description: En översikt över hur mykorrhizasvampar lever tillsammans med träd och hur de påverkas av skogsbruk.
  items:
    - title: Alla träd har mykorrhiza
      description: Trädens finrötter, ofta mer än hundra tusen per kvadratmeter, är om- och invuxna av mykorrhizasvampars mycel. Likt en diskborste sträcker sig svamparnas tunna hyfer ut från rotspetsarna och förstorar trädens rotsystem hundrafalt och mer. Svamparna förser träden med näring och vatten, och i utbyte får de socker från trädens fotosyntes.
      image: /images/Carousel/web/DavidReed.webp
    - title: Mer träd ger mer mykorrhiza
      description: Mykorrhizasvampar får sin energi med socker från trädens fotosyntes. Svampmängden och aktiviteten är större med många och stora träd än med små och få träd. Äldre skogar har också fler olika arter än unga skogar.
      image: /images/Carousel/web/MushrommTreeDiagram4.webp
    - title: Utan träd dör mykorrhizasvampar
      description: När träden avverkas upphör sockerflödet till rötterna. Då tynar mykorrhizasvamparna bort och dör. Ett trakthygge innebär att omkring 95% av mängden mykorrhizasvampar försvinner.
      image: /images/Carousel/web/Stock Image 481542412.webp
    - title: Mykorrhiza kräver levande rötter
      description: Mykorrhizasvampar kan bara överlever där det finns levande trädrötter, längs skogskanter, vid hänsynsträd eller på småplantor.
      image: /images/Carousel/web/skogsbruk.webp
    - title: Vanliga svampar kommer tillbaka
      description: Efter avverkning kommer främst de vanligaste svamparna tillbaka. De överlever i marken där det finns levande träd eller sprids in med sporer från närliggande skog. Ovanliga arter lyckas sällan återetablera sig.
      image: /images/Carousel/web/Spores Image.webp
    - title: Val av skogsskötsel påverkar
      description: Vid trakthygge försvinner de flesta arterna och mängden mykorrhiza minskar kraftigt under en period. Med hyggesfria metoder blir påverkan betydligt mindre, då det hela tiden finns många träd. Svampställen och ovanliga arter på platsen kan då fortleva.
      image: /images/Carousel/web/TraktBlad.webp
    - title: Hur kan man gynna mykorrhizasvampar?
      description: "Så här kan man göra man om man vill måna om de mykorrhizasvampar som finns i en skog: 1) Spara beståndet. 2) Låt skogen bli äldre, då fortlever svamparna längre. 3) Välj hyggesfria metoder. 4) Om skogen kalavverkas, lämna enstaka och grupper med hänsynsträd där svamparna kan fortleva."
      image: /images/Carousel/web/Mushroom Images.webp
