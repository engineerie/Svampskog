timelineSection:
  headline: Tidslinje
  title: Avverkningens faser i bild och text
  description: Tidslinjen är illustrerad och annoterad för att överskådligt visa vad som händer vid olika avverkningsfaser. Bilder och markörer visar också hur miljöhänsyn, som hänsynsträd och kanteffekter, påverkar mykorrhizans överlevnad.
  features:
    - title: Underlag
      description: Förekomsten av svampar i skogsmark vid olika skogsåldrar som dokumenterats i DNA-analyser på Markinventeringen och Riksskogstaxeringens permanenta provytor mellan 2014-2021.
    - description: Förhållandet mellan mycel av matsvampar, naturvårdssvampar och övriga mykorrhizasvamnpar baseras på resultat från DNA-analysen.
    - description: Forskning kring påverkan av skogsskötsel och miljöhänsyn på förekomsten av mykorrhizasvampar.
    - description: Forskning kring mykorrhizasvampars mycelstolekar.
