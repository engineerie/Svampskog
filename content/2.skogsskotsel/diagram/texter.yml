entries:
  - id: skogsskole
    description: Den totala mängen mykorrhizasvamp som mycel i marken i förhållande till förekomsten i äldre skog/före avverkning (%).
  - id: rodlistade
    description: Mängden av mykorrhizasvampar som är rödlistade/signalarter som mycel i marken i förhållande till förekomsten i äldre skog/före avverkning (%).
  - id: alla matsvampar
    description: Mängden av alla matsvampar som mycel i marken förhållande till förekomsten i äldre skog/före avverkning (%).
  - id: goda matsvampar
    description: Mängden av goda matsvampar som mycel i marken i förhållande till förekomsten i äldre skog/före avverkning (%).
    modalDescription: |
      Matsvampar omfattar de 75 arter som klassas som matsvampar i Nya svampboken (Holmberg & Marklund 2014) och av Svampguiden.com.

      Vad som är en god matsvamp är subjektivt. Här har vi klassat 43 arter som goda (bl a kantarell, stensopp och trattkantarell) och resterade 32 arter som ordinära matsvampar (bl a björksopp, grönkremla och pepparriska).
  - id: kg matsvampar
    description: Färskvikten av alla matsvampar (kg/ha) under en säsong i förhållande till förekomsten i äldre skog/före avverkning. Väderberoende, stor variation mellan år. Medel-, min- och maxvärde. Generaliserade värden från de undersökningar som finns.
  - id: grupper
    description: Mängden av olika grupper svampar som mycel i mark i förhållande till förekomsten i äldre skog/före avverkning (%).
    modalDescription: Den relativa fördelningen av olika grupper mykorrhizasvampar vid olika skogsåldrar. Uppgifterna baseras enbart på förekomst i skogar av olika åldrar och är inte kopplade till vilken skogsskötselmetod som använts.
