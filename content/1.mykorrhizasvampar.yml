factsSection:
  title: Lite om mykorrhizasvampar
  description: Korta fakta om mykorrhizasvamparnas mångfald, liv i marken och relation till skogen.
  items:
    - title: Många svampar bildar mykorrhiza
      description: De flesta större svampar i skogen bildar mykorrhiza - nästan alla ätliga och giftiga. Hit hör bland annat spindelskivlingar, kremlor, riskor, soppar och kantareller. Det finns också några som bildar små och oansenliga fruktkroppar och därför dåligt kända, bland annat många skinnsvampar.
      image: /images/Carousel/ManyMychorrhizatone.svg
    - title: Över 2000 arter i Sverige
      description: I Sverige finns över 2 000 olika mykorrhizasvampar. Några är vanliga, de flesta mindre vanliga eller till och med ovanliga. I en äldre skog kan det finnas ett par hundra arter. Ofta växer varje träds rotsystem i symbios med mycel av 50-100 arter.
      image: /images/Carousel/2000.svg
    - title: Det mesta är mycel i marken
      description: Fruktkropparna är bara en liten och tillfällig del av svampen. Den största delen är mycel i marken. Mycel växer under hela växtsäsongen och kan leva i många år.
      image: /images/Carousel/MainlyMycelTone.svg
    - title: Varje mycel är en individ
      description: Varje mycel i marken är en svampindivid, ofta någon till några kvadratmeter stor. I en skog finns många olika individer av både samma och olika arter. Olika individer bildar ett komplext lapptäcke av konkurrerande mycel.
      image: /images/Carousel/patchwork2.svg
navigation: false
speciesListsIntro:
  title: Artlistor på två sätt
  description: Vi presenterar artlistor som baseras på DNA-analyser av jordprover och förekomsten av fruktkroppar. De två metoderna kompletterar varandra och ger tillsammans en god bild av svamplivet i skogen.
videoSection:
  title: Kom igång med att utforska skogsmiljöer
  description: En kort genomgång av hur du söker fram olika skogstyper och tolkar artlistorna baserade på DNA och fruktkroppsfynd.
  image: /images/Landing/Screenshot 2026-03-03 at 10.15.50.png
