title: Svampar
description: Sök på vilka mykorrhizasvampar som kan finnas i olika skogar baserat på miljö-DNA och sammanställd kunskap om vart fruktkroppar förekommer.
dnaSection:
  headline: Enligt DNA
  title: Artförekomst baserad på mycel-DNA i markprover
  description: DNA-analyser görs med små markprover och fungerar utmärkt för frekventa och vanliga arter, men sämre för ovanliga arter. Vissa arter, såsom kantarell, detekteras heller inte eftersom deras DNA-sekvenser är för långa för den använda analysmetoden.
  features:
    - title: Underlag
      description: Bygger på analyser av svampars förekomst som mycel i ca 2000 markprover tagna i Markinventeringen och Riksskogstaxeringens permanenta provytor i skog under 2015–2021.
  image: /images/Sources/markinventering.png
environmentSection:
  title: Välj skogsmiljö
  description: Sök fram skogsmiljöer utifrån Markinventeringens miljövariabler.
fruitbodySection:
  headline: Enligt fruktkroppar
  title: Artförekomst enligt fruktkroppsfynd
  description: Med fruktkroppar kan alla arter som bildar fruktkroppar detekteras, vanliga som ovanliga. Fruktkroppar ger dock en ofullständig bild av artrikedomen och hur vanliga svamparna är, eftersom många arter sällan bildar eller saknar fruktkroppar.
  features:
    - title: Underlag
      description: Bygger främst på Artdatabankens sammanställningar av arters förekomst, ekologi och naturvårdsstatus.
  image: /images/Sources/samladkunskap.png
